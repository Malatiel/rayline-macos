name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  privacy:
    name: Privacy scan
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run privacy scan
        run: bash scripts/privacy_scan.sh

  swift:
    name: Swift tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Swift tests
        run: swift test

  cpp:
    name: C++ tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B cmake-build-ci -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build cmake-build-ci

      - name: Run C++ tests
        run: ctest --test-dir cmake-build-ci -V
