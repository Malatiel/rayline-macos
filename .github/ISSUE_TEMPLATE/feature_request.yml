name: Feature request
description: Suggest an improvement for Rayline
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please keep examples synthetic. Do not include real proxy links, UUIDs,
        passwords, private keys, personal paths, or raw logs.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI
        - Profiles
        - Parser
        - sing-box integration
        - System proxy
        - Build/release
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: This request does not include real proxy links, UUIDs, passwords, keys, certificates, personal paths, or raw logs.
          required: true
