name: Bug report
description: Report a reproducible Rayline problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Do not paste real proxy links, UUIDs, passwords, private keys, Apple
        signing credentials, local filesystem paths, or raw logs. Use the
        redacted diagnostics export from Rayline's Log tab when possible.
  - type: input
    id: version
    attributes:
      label: Rayline version
      placeholder: "1.0.9"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and architecture
      placeholder: "macOS 14.5, arm64"
    validations:
      required: true
  - type: dropdown
    id: protocol
    attributes:
      label: Protocol
      options:
        - VLESS
        - VMess
        - Shadowsocks
        - Trojan
        - Not protocol-specific
    validations:
      required: true
  - type: dropdown
    id: sing_box
    attributes:
      label: sing-box source
      options:
        - Bundled
        - Downloaded by Rayline
        - Selected local executable
        - Not sure
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use test credentials or redact sensitive values.
      placeholder: |
        1. Open Rayline
        2. Import a redacted profile
        3. Click Connect
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted diagnostics or logs
      description: Prefer Rayline's diagnostics export. Review it before attaching anything.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed real proxy links, UUIDs, passwords, keys, certificates, raw logs, local paths, and private server details.
          required: true
