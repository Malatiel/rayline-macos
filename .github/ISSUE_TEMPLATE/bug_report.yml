name: Bug report
description: Report a reproducible Veil problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste real proxy links, passwords,
        private keys, Apple signing credentials, or unredacted logs.
  - type: input
    id: version
    attributes:
      label: Veil version
      placeholder: "1.0.6"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and architecture
      placeholder: "macOS 14.5, arm64"
    validations:
      required: true
  - type: dropdown
    id: protocol
    attributes:
      label: Protocol
      options:
        - VLESS
        - VMess
        - Shadowsocks
        - Trojan
        - Not protocol-specific
    validations:
      required: true
  - type: dropdown
    id: sing_box
    attributes:
      label: sing-box source
      options:
        - Bundled
        - Downloaded by Veil
        - Selected local executable
        - Not sure
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use test credentials or redact sensitive values.
      placeholder: |
        1. Open Veil
        2. Import a redacted profile
        3. Click Connect
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      description: Remove credentials, UUIDs, keys, and private server details.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed real proxy links, credentials, keys, certificates, and personal logs.
          required: true
